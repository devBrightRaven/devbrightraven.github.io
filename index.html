  <section class="hero">
    <svg class="hero-mark" viewBox="0 0 500 520" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Enso — two stroked arcs, rotated slightly for organic feel -->
      <g transform="rotate(28, 252, 280)">
        <!-- Left stroke (pressing, darker) -->
        <path d="M 232 125 A 160 160 0 0 0 232 435"
              stroke="#e8e0d8" stroke-width="38" stroke-linecap="round" fill="none" opacity="0.14"/>
        <!-- Right stroke (lifting, lighter, slightly thinner) -->
        <path d="M 272 125 A 160 160 0 0 1 272 435"
              stroke="#e8e0d8" stroke-width="30" stroke-linecap="round" fill="none" opacity="0.10"/>
      </g>

      <!-- Raven — flying upward from the top gap between strokes -->
      <g fill="#e8e0d8" opacity="0.18" transform="translate(290, 48) rotate(-10)">
        <path d="M 0 0
                 C -8 -4, -30 -22, -58 -38
                 C -72 -46, -90 -50, -105 -46
                 C -95 -42, -78 -34, -58 -28
                 C -38 -22, -18 -12, -6 4
                 L -4 6
                 C -6 16, -10 26, -16 34
                 C -12 33, -6 30, -2 24
                 L 0 20
                 L 2 24
                 C 6 30, 12 33, 16 34
                 C 10 26, 6 16, 4 6
                 L 6 4
                 C 18 -12, 38 -22, 58 -28
                 C 78 -34, 95 -42, 105 -46
                 C 90 -50, 72 -46, 58 -38
                 C 30 -22, 8 -4, 0 0 Z"/>
        <ellipse cx="0" cy="-6" rx="4.5" ry="5.5"/>
        <path d="M -2 -10 L 0 -20 L 2 -10 Z"/>
      </g>
    </svg>

    <div class="hero-content">
      <h1 class="brand">Bright Raven</h1>
      <p class="tagline">Building tools that respect your attention.</p>
    </div>
  </section>
